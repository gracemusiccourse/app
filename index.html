<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace Music Course</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:          #2a1540;
    --paper:        #fdfaff;
    --cream:        #ede5f8;
    --accent:       #8540b8;
    --accent-dark:  #6b2d96;
    --accent-light: #f3e8ff;
    --pink:         #c94fa0;
    --pink-light:   #fce8f6;
    --muted:        #8a6aab;
    --border:       #d8c5ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Background decoration ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(133,64,184,.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%,  rgba(201,79,160,.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .page {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 3rem;
    position: relative;
    z-index: 1;
  }

  /* ── Logo & title ── */
  .brand { text-align: center; margin-bottom: 3rem; }
  .logo-wrap {
    width: 100px; height: 100px;
    background: #fff;
    border-radius: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(133,64,184,.2);
    margin-bottom: 1.25rem;
    overflow: hidden;
  }
  .logo-wrap img { width: 90px; height: 90px; object-fit: contain; }
  .logo-fallback { font-size: 48px; }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(24px, 5vw, 36px);
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .brand-sub {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: .06em;
  }

  /* ── Cards ── */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    width: 100%;
    max-width: 560px;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 1rem;
    padding: 2rem 1.5rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: #fff;
    text-decoration: none;
    color: var(--ink);
    box-shadow: 0 4px 20px rgba(133,64,184,.08);
    transition: transform .18s, box-shadow .18s, border-color .18s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(133,64,184,.18);
    border-color: var(--accent);
  }
  .card:active { transform: translateY(-1px); }

  .card-icon {
    width: 64px; height: 64px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .card.admin .card-icon  { background: var(--accent-light); }
  .card.report .card-icon { background: var(--pink-light); }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink);
    line-height: 1.2;
  }
  .card-desc {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.6;
  }

  .card-arrow {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: background .15s;
    margin-top: auto;
  }
  .card.admin  .card-arrow { background: var(--accent-light); color: var(--accent-dark); }
  .card.report .card-arrow { background: var(--pink-light);   color: var(--pink); }
  .card:hover  .card-arrow { background: var(--accent); color: #fff; }
  .card.report:hover .card-arrow { background: var(--pink); color: #fff; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: .08em;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; max-width: 340px; }
    .card  { flex-direction: row; text-align: left; padding: 1.25rem 1.5rem; }
    .card-icon { width: 52px; height: 52px; font-size: 22px; border-radius: 14px; }
    .card-arrow { display: none; }
    .brand { margin-bottom: 2rem; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Brand -->
  <div class="brand">
    <div class="logo-wrap">
      <img src="logo.png" alt="Grace Music Course"
           onerror="this.parentElement.innerHTML='<span class=\'logo-fallback\'>🎵</span>'">
    </div>
    <div class="brand-name">Grace Music Course</div>
    <div class="brand-sub">Teacher Dashboard</div>
  </div>

  <!-- Navigation cards -->
  <div class="cards">

    <a href="admin.html" class="card admin">
      <div class="card-icon">💰</div>
      <div>
        <div class="card-title">Admin</div>
        <div class="card-desc">Invoice, status bayar & data murid</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a href="report.html" class="card report">
      <div class="card-icon">📊</div>
      <div>
        <div class="card-title">Progress Report</div>
        <div class="card-desc">Generate laporan perkembangan murid</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

  </div>
</div>

<footer>Grace Music Course &nbsp;·&nbsp; Teacher Portal</footer>

</body>
</html>
